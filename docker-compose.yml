# F1 Nexus — Full-Stack Docker Compose
# Usage:
#   Development : docker-compose up --build
#   Production  : docker-compose -f docker-compose.yml up -d
#
# Set secrets in a .env file at the repo root (see .env.example).

version: "3.9"

services:

  # ─── Ollama (Local LLM) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: f1-nexus-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: f1-nexus-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist FastF1 cache and SQLite DB across container restarts
      - backend_data:/app/data
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      # SMTP — set in .env file
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-F1 Nexus}
      - APP_URL=${APP_URL:-http://localhost:3000}
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./f1-nexus
      dockerfile: Dockerfile
      args:
        # Passed at build-time so Next.js bakes the URL into the bundle
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: f1-nexus-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:     # LLM model weights — survives container restarts
  backend_data:    # FastF1 cache + SQLite subscriber DB
